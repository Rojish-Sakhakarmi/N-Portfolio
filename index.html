<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Vercel Site</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 600px;
        }
        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }
        p {
            color: #94a3b8;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            background: #38bdf8;
            color: black;
            cursor: pointer;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Site is Working 🚀</h1>
        <p>Your Vercel deployment is successful.</p>
        <button onclick="alert('Hello from Vercel!')">Click Me</button>
    </div>
</body>
</html>
